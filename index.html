<!DOCTYPE html>

<head>

  <title>REGISTRO DE AVARIA</title>
  <style>
    /* Trava o scroll e centraliza com foco em ergonomia */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; 
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    form {
      background: white;
      padding: 30px 50px;
      border-radius: 20px;
      width: 600px; /* Largura aumentada para melhor leitura */
      max-height: 98vh;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      position: relative;
      box-sizing: border-box;
    }
    h2 { 
      text-align: center; 
      margin-top: 0; 
      margin-bottom: 20px; 
      color: #333;
      font-size: 28px; /* Título maior */
    }
    
    .session-counter {
      position: absolute;
      top: 20px;
      right: 25px;
      background: #4f46e5;
      color: white;
      font-size: 14px; /* Contador mais visível */
      padding: 6px 12px;
      border-radius: 12px;
      font-weight: bold;
    }

    label { 
      font-weight: bold; 
      display: block; 
      margin-top: 12px; 
      font-size: 16px; /* Fonte maior para etiquetas */
      color: #444;
    }

    input, select {
      width: 100%; 
      padding: 12px; /* Campos mais altos e fáceis de clicar */
      margin-top: 6px;
      border: 2px solid #bbb; 
      border-radius: 6px;
      text-transform: uppercase;
      box-sizing: border-box;
      font-size: 16px; /* Letra maior dentro do campo */
      color: #222;
    }

    input:focus, select:focus {
      border-color: #007BFF;
      outline: none;
      background-color: #f0f7ff;
    }

    button {
      margin-top: 25px;
      background: #007BFF; 
      color: white;
      padding: 15px; 
      border: none; 
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
      font-size: 18px; /* Botão de destaque */
      transition: background 0.3s;
    }
    button:hover { background: #0056b3; }

    .success {
      margin-top: 15px;
      padding: 12px;
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      border-radius: 6px;
      display: none;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
    }

    footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      left: 0;
      text-align: center;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

  <script>
    const form = document.getElementById("auditoriaForm");
    const msg = document.getElementById("msg");
    const countDisplay = document.getElementById("count");
    let sessionCount = 0;

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      for (let key in data) {
        if (typeof data[key] === 'string' && key !== 'tipoAvaria' && key !== 'categoria') {
          data[key] = data[key].toUpperCase().trim();
        }
      }

      const agora = new Date();
      data.timestamp = agora.toLocaleString('pt-BR');

      fetch("https://script.google.com/macros/s/AKfycbzb-R_dC-hx7jEC6LPZzJ791I5o1LPEYU9VD5lgrnHqf0RH_6m613hQqRiCzUK_T_C3/exec", {
        method: "POST",
        body: JSON.stringify(data)
      })
      .then(res => res.text())
      .then(txt => {
        sessionCount++;
        countDisplay.textContent = sessionCount;

        const isFixed = document.getElementById("fixarCabecalho").checked;
        const valOr = data.or;
        const valNotaFiscal = data.notaFiscal;
        const valFornecedor = data.fornecedor;
        const valMarca = data.marca;
        const valResponsavel = data.responsavel;

        form.reset();

        if (isFixed) {
          document.getElementById("fixarCabecalho").checked = true;
          form.elements['or'].value = valOr;
          form.elements['notaFiscal'].value = valNotaFiscal;
          form.elements['fornecedor'].value = valFornecedor;
          form.elements['marca'].value = valMarca;
          form.elements['responsavel'].value = valResponsavel;
          form.elements['produto'].focus();
        }

        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 3000);
      })
      .catch(err => alert("Erro ao enviar: " + err));
    });
